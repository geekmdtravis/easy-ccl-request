name: NPM Publish

on:
  release:
    types: [published]

jobs:
  # Job 1: Run tests across the matrix to ensure cross-platform compatibility
  test:
    name: Test on Node ${{ matrix.node }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: ['22.x', '24.x']
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install deps
        uses: bahmutov/npm-install@v1

      - name: Lint and Test
        run: |
          npm run lint
          npm run test --ci --coverage --maxWorkers=2

  # Job 2: Actually publish the package using OIDC (Trusted Publishing)
  publish:
    name: Publish to npm
    needs: test # Only runs if the test job passes
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write # CRITICAL: Required for OIDC / Trusted Publishing

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: https://registry.npmjs.org/

      - name: Install deps
        uses: bahmutov/npm-install@v1

      - name: Build package
        run: npm run build

      - name: Publish to npm
        # --provenance links this package to this exact GitHub Action run
        run: npm publish --provenance --access public
